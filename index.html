<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Confetti</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FFFBF4;--cream2:#FFF4E6;
  --rose100:#FFE8EE;--rose200:#FFCDD9;--rose300:#FFAABE;--rose400:#F97FA0;--rose500:#F05580;--rose600:#D63A66;
  --lav100:#F0ECFF;--lav200:#DDD5FF;--lav300:#C4B5F8;--lav500:#8B6EE0;
  --gold100:#FFF4CC;--gold300:#FFD740;--gold500:#E0A800;
  --green100:#d4f5e2;--green600:#1a6b3a;--green700:#27ae60;
  --ink:#2A1638;--soft:#7A5A8A;
  --border:rgba(240,85,128,0.15);--borderl:rgba(200,160,220,0.22);
  --font:'Outfit',sans-serif;--display:'Playfair Display',Georgia,serif;
}
html,body{height:100%;margin:0}
body{font-family:var(--font);background:var(--cream);color:var(--ink);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

/* topbar */
.topbar{background:rgba(255,251,244,.97);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 10px rgba(240,85,128,.07)}
.logo{font-family:var(--display);font-size:20px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:7px;white-space:nowrap;cursor:pointer}
.logo em{font-style:normal;color:var(--rose500)}
.logo-dots{display:flex;gap:2px}
.logo-dots span{display:inline-block;width:5px;height:5px;border-radius:50%}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
select{padding:7px 10px;background:#fff;border:1px solid var(--borderl);border-radius:8px;color:var(--ink);font-size:13px;font-family:var(--font);outline:none;cursor:pointer}

/* layout */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:195px;background:rgba(255,251,244,.98);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.content{flex:1;overflow-y:auto;padding:18px}

/* sidebar */
.nav-sec{padding:10px 12px 3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--soft)}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:500;color:var(--soft);border-left:2px solid transparent;transition:all .13s;user-select:none}
.nav-item:hover{color:var(--ink);background:var(--rose100)}
.nav-item.active{color:var(--rose600);border-left-color:var(--rose500);background:var(--rose100)}
.nav-item i{font-size:15px;flex-shrink:0}
.binder-li{display:flex;align-items:center;gap:6px;padding:5px 12px 5px 14px;cursor:pointer;font-size:12px;font-weight:500;color:var(--soft);border-left:2px solid transparent;transition:all .13s}
.binder-li:hover{color:var(--ink);background:var(--rose100)}
.binder-li.active{border-left-color:var(--rose500);color:var(--ink)}
.bdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.add-binder-btn{margin:5px 10px;padding:6px;border:1px dashed var(--border);border-radius:8px;background:none;color:var(--soft);font-size:11px;font-family:var(--font);cursor:pointer;width:calc(100% - 20px);display:flex;align-items:center;justify-content:center;gap:5px;transition:all .13s}
.add-binder-btn:hover{border-color:var(--rose400);color:var(--rose500)}

/* buttons */
.btn{padding:7px 13px;border-radius:8px;border:1px solid var(--borderl);background:#fff;color:var(--ink);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .13s;white-space:nowrap;text-decoration:none}
.btn:hover{border-color:var(--rose400);color:var(--rose500)}
.btn.primary{background:linear-gradient(135deg,var(--rose500),var(--rose600));color:#fff;border:none;box-shadow:0 4px 14px rgba(240,85,128,.28)}
.btn.primary:hover{box-shadow:0 6px 18px rgba(240,85,128,.42);transform:translateY(-1px);color:#fff}
.btn.success{background:var(--green100);border-color:var(--green700);color:var(--green600)}
.btn.success:hover{background:#b8eece}
.btn.danger{border-color:#c0392b;color:#e74c3c}
.btn.danger:hover{background:#c0392b18}
.btn.owned-btn{background:var(--green100);border-color:var(--green700);color:var(--green600)}
.btn.wanted-btn{background:var(--rose100);border-color:var(--rose400);color:var(--rose600)}

/* cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:10px}
.card-item{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .14s,box-shadow .14s;border:2px solid transparent;background:#fff}
.card-item:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(240,85,128,.13)}
.card-item.owned{border-color:rgba(92,186,122,.55)}
.card-item.wanted{border-color:rgba(240,85,128,.42)}
.card-img{width:100%;display:block;aspect-ratio:2.5/3.5;object-fit:cover;background:var(--cream2)}
.card-no-img{aspect-ratio:2.5/3.5;background:var(--cream2);display:flex;align-items:center;justify-content:center;color:var(--rose200);font-size:30px}
.card-label{padding:6px 7px 7px}
.card-name{font-size:11.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-num{font-size:10px;font-weight:700;color:var(--rose500);margin-top:1px}
.card-set{font-size:10px;color:var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.card-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.badge{padding:2px 6px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase}
.badge-owned{background:var(--green100);color:var(--green600)}
.badge-wanted{background:var(--rose100);color:var(--rose600)}
.rarity-pip{position:absolute;top:4px;right:4px;border-radius:5px;padding:2px 5px;font-size:8px;font-weight:700;color:#fff}
.rp-holo{background:linear-gradient(135deg,rgba(138,110,224,.9),rgba(180,142,212,.9))}
.rp-ultra{background:linear-gradient(135deg,rgba(240,85,128,.9),rgba(201,62,102,.9))}
.rp-secret{background:linear-gradient(135deg,rgba(245,194,0,.95),rgba(224,168,0,.95));color:#1E0E2A}
.score-pip{position:absolute;top:4px;left:4px;background:rgba(255,255,255,.93);border-radius:6px;padding:2px 5px;font-size:8px;font-weight:700;border:1px solid var(--borderl);display:flex;align-items:center;gap:2px}
.score-pip.hi{color:var(--green600);border-color:rgba(92,186,122,.4)}
.score-pip.mid{color:var(--gold500);border-color:rgba(245,194,0,.4)}
.hover-btns{position:absolute;bottom:0;left:0;right:0;display:flex;opacity:0;transition:opacity .13s;background:linear-gradient(transparent,rgba(42,20,56,.88))}
.card-item:hover .hover-btns{opacity:1}
.hbtn{flex:1;padding:6px 2px;border:none;background:none;color:#fff;font-size:9px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;flex-direction:column;align-items:center;gap:1px}
.hbtn:hover{color:var(--gold300)}
.hbtn i{font-size:13px}

/* pagination */
.pagination{display:flex;align-items:center;gap:6px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.pg-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--borderl);background:#fff;color:var(--ink);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .13s}
.pg-btn:hover{border-color:var(--rose400)}
.pg-btn.cur{background:var(--rose500);color:#fff;border-color:var(--rose500)}
.pg-btn:disabled{opacity:.4;cursor:default}

/* overlays */
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(42,20,56,.72);align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--cream);border:1px solid var(--borderl);border-radius:16px;box-shadow:0 20px 50px rgba(42,20,56,.28)}
.mscroll{overflow-y:auto;max-height:88vh}
.mscroll::-webkit-scrollbar{display:none}

/* detail */
.dtop{padding:20px;text-align:center;background:var(--cream2);border-bottom:1px solid var(--borderl);position:relative}
.dclose{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.8);border:none;color:var(--ink);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.dclose:hover{background:var(--rose100);color:var(--rose600)}
.dimg{max-width:165px;border-radius:10px;box-shadow:0 8px 24px rgba(42,20,56,.2)}
.dbody{padding:14px 18px 18px}
.dname{font-family:var(--display);font-size:22px;font-weight:500;margin-bottom:2px}
.dnum{font-size:13px;font-weight:700;color:var(--rose500);margin-bottom:2px}
.dset{font-size:12px;color:var(--soft);margin-bottom:10px}
.action-row{display:flex;gap:8px;margin:8px 0 10px}
.action-btn{flex:1;padding:9px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none;border:none;transition:all .13s}
.btn-ebay{background:#E53238;color:#fff}.btn-ebay:hover{background:#c02020}
.btn-bulba{background:var(--lav100);color:var(--lav500);border:1px solid var(--lav300)!important}.btn-bulba:hover{background:var(--lav200)}
.status-row{display:flex;gap:8px;margin-bottom:10px}
.status-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--borderl);background:#fff;color:var(--soft);font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .13s}
.status-btn.on-owned{background:var(--green100);border-color:var(--green700);color:var(--green600)}
.status-btn.on-wanted{background:var(--rose100);border-color:var(--rose400);color:var(--rose600)}
.drows{margin-top:8px}
.drow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--borderl);font-size:12px}
.drow:last-child{border-bottom:none}
.dl{color:var(--soft)}.dv{font-weight:600;text-align:right;max-width:200px}
.chips-wrap{margin-top:12px}
.chips-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--soft);margin-bottom:6px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--borderl);cursor:pointer;margin:2px;transition:all .13s;background:#fff}
.chip:hover{border-color:var(--rose300)}
.chip.in{border-color:var(--rose400);color:var(--rose600);background:var(--rose100)}

/* new binder modal */
.mhead{padding:16px 18px;border-bottom:1px solid var(--borderl);font-family:var(--display);font-size:20px;font-weight:500}
.mbody{padding:16px 18px}
.mfoot{padding:12px 18px;border-top:1px solid var(--borderl);display:flex;gap:8px}
.fg{margin-bottom:12px}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--soft);margin-bottom:5px;display:block}
.fi{width:100%;padding:8px 11px;background:#fff;border:1px solid var(--borderl);border-radius:8px;color:var(--ink);font-size:13px;font-family:var(--font);outline:none}
.fi:focus{border-color:var(--rose400)}
.swatches{display:flex;gap:6px;flex-wrap:wrap}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .1s;flex-shrink:0}
.swatch.on{border-color:var(--ink);transform:scale(1.2)}
.layouts{display:flex;gap:7px;flex-wrap:wrap}
.lopt{border:2px solid var(--borderl);border-radius:9px;padding:8px;cursor:pointer;transition:all .13s;background:#fff;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:62px}
.lopt:hover{border-color:var(--rose300)}
.lopt.on{border-color:var(--rose500);background:var(--rose100)}
.lgrid{display:grid;gap:2px;width:38px;height:38px}
.lcell{background:var(--rose200);border-radius:2px}
.lopt.on .lcell{background:var(--rose400)}
.llabel{font-size:9px;font-weight:700;color:var(--soft)}
.lopt.on .llabel{color:var(--rose600)}

/* picker */
.picker-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(42,20,56,.72);align-items:flex-start;justify-content:center;padding-top:40px}
.picker-ov.open{display:flex}
.picker-modal{background:var(--cream);border:1px solid var(--borderl);border-radius:16px;width:490px;max-height:78vh;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(42,20,56,.28)}
.picker-head{padding:12px 16px;border-bottom:1px solid var(--borderl);display:flex;align-items:center;gap:10px}
.picker-title{font-family:var(--display);font-size:17px;font-weight:500;flex:1}
.picker-close{background:rgba(255,255,255,.8);border:none;color:var(--ink);border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.picker-search{padding:9px 14px;border-bottom:1px solid var(--borderl)}
.picker-grid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:7px}
.pcard{border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;background:#fff;transition:all .13s}
.pcard:hover{border-color:var(--rose400);transform:translateY(-2px)}
.pcard img{width:100%;display:block;aspect-ratio:2.5/3.5;object-fit:cover}
.pcard-name{padding:3px 4px;font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-num{padding:0 4px 3px;font-size:9px;color:var(--rose500);font-weight:700}

/* binder */
.binder-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.binder-title{font-family:var(--display);font-size:26px;font-weight:500}
.binder-tabs{display:flex;gap:7px;margin-bottom:14px;border-bottom:1px solid var(--borderl);padding-bottom:10px;flex-wrap:wrap}
.btab{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--borderl);background:#fff;color:var(--soft);transition:all .13s}
.btab.active{background:var(--rose500);color:#fff;border-color:var(--rose500)}
.btab:hover:not(.active){border-color:var(--rose300);color:var(--rose500)}
.binder-pages{display:flex;flex-direction:column;gap:12px}
.bpage{background:#fff;border:1px solid var(--borderl);border-radius:12px;padding:12px;max-width:500px}
.page-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--soft);margin-bottom:8px;display:flex;justify-content:space-between}
.pgrid{display:grid;gap:5px}
.pslot{aspect-ratio:2.5/3.5;border-radius:7px;border:1.5px dashed var(--borderl);background:rgba(255,240,246,.5);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;transition:all .13s}
.pslot:hover{border-color:var(--rose400);background:var(--rose100)}
.pslot img{width:100%;height:100%;object-fit:cover;border-radius:6px;display:block}
.pslot.filled{border-style:solid;border-color:var(--borderl)}
.pslot.filled:hover{border-color:var(--rose400)}
.slot-rm{position:absolute;top:3px;right:3px;background:rgba(42,20,56,.7);border:none;color:#fff;border-radius:50%;width:17px;height:17px;cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;line-height:1}
.pslot.filled:hover .slot-rm{display:flex}
.add-pg-btn{width:100%;max-width:500px;padding:9px;border:1.5px dashed var(--borderl);border-radius:9px;background:none;color:var(--soft);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .13s;margin-top:5px}
.add-pg-btn:hover{border-color:var(--rose400);color:var(--rose500)}

/* suggest */
.suggest-banner{background:linear-gradient(135deg,var(--lav100),var(--rose100));border:1px solid var(--lav300);border-radius:11px;padding:14px 16px;margin-bottom:14px}
.suggest-signals{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.signal-chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#fff;border:1px solid var(--borderl);color:var(--soft)}
.signal-chip.on{border-color:var(--rose400);color:var(--rose600);background:var(--rose100)}
.curate-actions{display:flex;gap:4px;margin-top:4px}
.cbtn{flex:1;padding:5px;border-radius:6px;border:none;font-size:10px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;transition:all .13s}
.cbtn.y{background:var(--green100);color:var(--green600)}.cbtn.y:hover,.cbtn.y.on{background:var(--green700);color:#fff}
.cbtn.n{background:var(--rose100);color:var(--rose600)}.cbtn.n:hover,.cbtn.n.on{background:var(--rose500);color:#fff}
.card-item.accepted{border-color:rgba(92,186,122,.7)}
.card-item.rejected{opacity:.33}

/* misc */
.empty-state{text-align:center;padding:52px 20px;color:var(--soft)}
.empty-state i{font-size:44px;margin-bottom:10px;opacity:.25;display:block}
.empty-state p{font-size:13px;line-height:1.6}
.loading-state{text-align:center;padding:52px;color:var(--soft);font-size:13px}
.spinner{width:26px;height:26px;border:2.5px solid var(--borderl);border-top-color:var(--rose400);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.page-title{font-family:var(--display);font-size:26px;font-weight:500;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--soft);margin-bottom:16px}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--soft);margin:16px 0 9px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--borderl)}
.stats-row{display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap}
.stat-chip{background:#fff;border:1px solid var(--borderl);border-radius:9px;padding:7px 13px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;cursor:pointer;transition:border-color .13s}
.stat-chip:hover{border-color:var(--rose300)}
.stat-num{font-size:18px;font-weight:700;color:var(--rose500)}
.dash-binders{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;margin-bottom:4px}
.dash-bc{background:#fff;border:1.5px solid var(--borderl);border-radius:11px;padding:13px;cursor:pointer;transition:border-color .13s}
.welcome-box{background:linear-gradient(135deg,var(--rose100),var(--lav100));border-radius:13px;padding:26px;text-align:center;margin-top:6px}
.search-wrap{position:relative}
.search-wrap i.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--soft);font-size:15px;pointer-events:none}
.search-wrap input{width:100%;padding:8px 10px 8px 30px;background:#fff;border:1px solid var(--borderl);border-radius:8px;color:var(--ink);font-size:13px;font-family:var(--font);outline:none}
.search-wrap input:focus{border-color:var(--rose400)}
.search-wrap input::placeholder{color:var(--soft)}
.sri{display:flex;align-items:center;gap:9px;padding:8px;border-radius:8px;border:1px solid var(--borderl);background:#fff;transition:all .13s}
.sri:hover{border-color:var(--rose300);background:var(--rose100)}
.sri-img{width:40px;border-radius:5px;flex-shrink:0;aspect-ratio:2.5/3.5;object-fit:cover;background:var(--cream2)}
.sri-info{flex:1;min-width:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--rose200);border-radius:2px}
.disc-hub-card:hover{border-color:var(--rose400)!important}
.inline-tag-input:focus{border-color:var(--rose400)!important;outline:none}
.inline-tag-input{transition:border-color .13s}
.disc-set-card:hover{border-color:var(--rose400)!important}
.type-filter-wrap{position:relative}
.type-filter-wrap i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--soft);font-size:14px;pointer-events:none}
.type-filter-wrap input{width:160px;padding:7px 10px 7px 28px;background:#fff;border:1px solid var(--borderl);border-radius:8px;color:var(--ink);font-size:13px;font-family:var(--font);outline:none}
.type-filter-wrap input:focus{border-color:var(--rose400)}
.type-filter-wrap input::placeholder{color:var(--soft)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo" id="logoHome">
      <div class="logo-dots">
        <span style="background:var(--rose400)"></span>
        <span style="background:var(--gold300)"></span>
        <span style="background:var(--lav300)"></span>
      </div>
      Card <em>Confetti</em>
    </div>
    <div class="topbar-right">
      <div class="type-filter-wrap">
        <i class="ti ti-filter"></i>

// Refresh just the tag row for one card in the search results — no full re-render
function refreshInlineTags(cardId, container) {
  const wrap = container ? container.querySelector('.inline-tags[data-card-id="'+cardId+'"]') : null;
  if (!wrap) return;
  const cardTags = S.tags[cardId] || [];

  ).join('')
  + (cardTags.length < 5

      : '');
  // re-attach listeners
  wrap.querySelectorAll('.inline-tag-rm').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      removeTagFromCard(btn.dataset.cardId, btn.dataset.tag);
      refreshInlineTags(btn.dataset.cardId, container);

  });
  wrap.querySelectorAll('.inline-tag-input').forEach(input => {
    input.addEventListener('keydown', e => {

        if (val && addTagToCard(cardId, val)) { input.value=''; refreshInlineTags(cardId, container); }
      }
    });
    input.addEventListener('blur', () => {
      const val = input.value.trim();
      if (val && addTagToCard(cardId, val)) { input.value=''; refreshInlineTags(cardId, container); }
    });

function rebuildAllTags() {
  const set = new Set(S.allTags);
  Object.values(S.tags).forEach(ts => ts.forEach(t => set.add(t)));

}
function addTagToCard(cardId, tag) {
  if (!tag) return false;
  const clean = tag.trim();
  if (!clean) return false;
  const current = S.tags[cardId] || [];
  if (current.includes(clean)) return false;
  if (current.length >= 5) return false;
  S.tags[cardId] = [...current, clean];
  if (!S.allTags.includes(clean)) { S.allTags = [...S.allTags, clean].sort(); }
  save();
  return true;
}
function removeTagFromCard(cardId, tag) {
  if (!S.tags[cardId]) return;
  S.tags[cardId] = S.tags[cardId].filter(t => t !== tag);
  if (!S.tags[cardId].length) delete S.tags[cardId];
  save();
}
function getTagSuggestions(cardId) {
  const current = S.tags[cardId] || [];
  const all = [...new Set([...S.allTags, ...PRESET_TAGS])].sort();
  return all.filter(t => !current.includes(t));
}

// ─── API ─────────────────────────────────────────────────────
const _cache = {};
async function api(path, params) {
  const u = new URL(API + path);
  if (params) Object.entries(params).forEach(([k,v]) => u.searchParams.set(k,v));
  const key = u.toString();
  if (_cache[key]) return _cache[key];
  const r = await fetch(key, { headers: HDR });
  if (!r.ok) throw new Error('API ' + r.status);
  const d = await r.json();
  _cache[key] = d;
  return d;
}

// ─── CARD HELPERS ────────────────────────────────────────────
const cImg  = c => (c.images && c.images.small) || '';
const cImgL = c => (c.images && c.images.large) || c.images && c.images.small || '';
const cNum  = c => { if (!c.number) return ''; const t = c.set && (c.set.printedTotal||c.set.total); return '#'+c.number+(t?'/'+t:''); };
const cSet  = c => (c.set && c.set.name) || '';
const cSer  = c => (c.set && c.set.series) || '';
const cSetId= c => (c.set && c.set.id) || '';
const cRar  = c => c.rarity || '';
const cArt  = c => c.artist || '';
const cFlav = c => c.flavorText || '';
const cType = c => c.types || [];
const cSub  = c => c.subtypes || [];

function rarPip(r) {
  const l = (r||'').toLowerCase();
  if (l.includes('special illustration')||l.includes('secret')||l.includes('rainbow')||l.includes('hyper')) return 'rp-secret';
  if (l.includes('ultra')||l.includes('illustration')||l.includes('double')||l.includes('ace')||l.includes('radiant')) return 'rp-ultra';
  if (l.includes('holo')||l.includes('shiny')||l.includes('break')||l.includes('star')) return 'rp-holo';
  return '';
}
function rarShort(r) {
  return {'Illustration Rare':'IR','Special Illustration Rare':'SIR','Hyper Rare':'HR',
    'Double Rare':'DR','ACE SPEC Rare':'ACE','Ultra Rare':'UR','Rare Rainbow':'RR',
    'Rare Secret':'SR','Rare Shiny':'ShR','Rare Shiny GX':'ShGX','Radiant Rare':'Rad',
    'Rare Holo EX':'EX','Rare Holo GX':'GX','Rare Ultra':'UR','Rare Holo Star':'★','Rare BREAK':'BRK'}[r] || '';
}
function ebayUrl(c) {
  const q = encodeURIComponent((c.name||'')+' '+(c.number||'')+' '+cSet(c)+' pokemon card');
  const target = 'https://www.ebay.com/sch/i.html?_nkw='+q+'&_sacat=2536&LH_BIN=1';
  // EPN affiliate tracking parameters
  return target+'&mkevt=1&mkcid=1&mkrid=711-53200-19255-0&campid=5339155010&toolid=10001';
}
function bulbaUrl(c) {
  return 'https://bulbapedia.bulbagarden.net/wiki/'+encodeURIComponent(c.name||'')+'_(card)';
}

// ─── FETCH ───────────────────────────────────────────────────
async function fetchFullArt(extraQ, page, pageSize) {
  const base = extraQ ? '('+extraQ+') ('+FULL_ART_Q+')' : '('+FULL_ART_Q+')';
  return api('/cards', { q: base, page: page||1, pageSize: pageSize||PS, orderBy: '-rarity' });
}
async function fetchAny(extraQ, page, pageSize) {
  const q = extraQ || 'hp:[1 TO *]';
  return api('/cards', { q, page: page||1, pageSize: pageSize||PS, orderBy: 'name' });
}

async function fetchByIds(ids) {
  if (!ids.length) return [];
  // Fire all chunks in parallel for speed
  const chunks = [];
  for (let i = 0; i < ids.length; i += 20) chunks.push(ids.slice(i, i+20));
  const results = await Promise.all(chunks.map(async chunk => {
    try {
      const d = await api('/cards', { q: chunk.map(id => 'id:'+id).join(' OR '), pageSize: 20 });
      return d.data || [];
    } catch(e) { return []; }
  }));
  return results.flat();
}

async function searchFullArt(query) {
  const parts = query.trim().split(/\s+/);
  const last  = parts[parts.length-1];
  let nameQ;
  if (parts.length > 1 && /^\d+$/.test(last)) {
    nameQ = 'name:"'+parts.slice(0,-1).join(' ')+'*" number:'+last;
  } else {
    nameQ = 'name:"'+query.trim()+'*"';
  }
  // orderBy name is faster than rarity for search
  const d = await api('/cards', { q: nameQ, pageSize: 24, orderBy: 'name' });
  const cards = d.data || [];
  const ql = (parts.length>1 && /^\d+$/.test(last) ? parts.slice(0,-1).join(' ') : query.trim()).toLowerCase();
  return cards.sort((a,b) => {
    const an=(a.name||'').toLowerCase(), bn=(b.name||'').toLowerCase();
    if(an===ql && bn!==ql) return -1;
    if(bn===ql && an!==ql) return 1;
    if(an.startsWith(ql) && !bn.startsWith(ql)) return -1;
    if(bn.startsWith(ql) && !an.startsWith(ql)) return 1;
    return 0;
  });
}

// ─── SUGGESTION ENGINE ───────────────────────────────────────
// Given cards already in a binder, score candidate full art cards
// Signals: same artist, same set, same type, same rarity tier, same Pokémon species
function buildSignals(seedCards) {
  const signals = {
    artists:  {},
    sets:     {},
    types:    {},
    rarTier:  {},
    species:  {},
  };
  seedCards.forEach(c => {
    const art = cArt(c); if (art) signals.artists[art] = (signals.artists[art]||0)+1;
    const sid = cSetId(c); if (sid) signals.sets[sid]   = (signals.sets[sid]||0)+1;
    cType(c).forEach(t => { signals.types[t] = (signals.types[t]||0)+1; });
    const rt = rarTier(cRar(c)); if (rt) signals.rarTier[rt] = (signals.rarTier[rt]||0)+1;
    // extract Pokémon species from name (first word(s) before modifiers like V, GX, ex etc.)
    const sp = speciesName(c.name||'');
    if (sp) signals.species[sp] = (signals.species[sp]||0)+1;
  });
  return signals;
}

function rarTier(r) {
  const l = (r||'').toLowerCase();
  if (l.includes('special illustration')) return 'SIR';
  if (l.includes('illustration'))         return 'IR';
  if (l.includes('hyper')||l.includes('rainbow')||l.includes('secret')) return 'secret';
  if (l.includes('ultra')||l.includes('double')||l.includes('ace'))     return 'ultra';
  if (l.includes('holo')||l.includes('shiny')||l.includes('radiant'))   return 'holo';
  return '';
}

function speciesName(name) {
  // strip common suffixes: V, VMAX, VSTAR, GX, EX, ex, -EX, Tag Team parts
  return name.replace(/\s+(V|VMAX|VSTAR|GX|EX|ex|BREAK|Radiant|Shining|Prism Star)$/i,'')
             .replace(/[\-&].*$/,'').trim().toLowerCase();
}

function scoreCandidate(card, signals, seedIds) {
  if (seedIds.has(card.id)) return -1; // already in binder
  if (S.votes[card.id] === 'no') return -1; // skipped
  if (S.votes[card.id] === 'yes') return 999; // accepted

  let score = 0;
  const art = cArt(card);
  const sid = cSetId(card);
  const rt  = rarTier(cRar(card));
  const sp  = speciesName(card.name||'');

  if (art && signals.artists[art]) score += 50 * signals.artists[art]; // strongest signal
  if (sid && signals.sets[sid])    score += 30 * signals.sets[sid];
  cType(card).forEach(t => { if (signals.types[t]) score += 20 * signals.types[t]; });
  if (rt && signals.rarTier[rt])   score += 15 * signals.rarTier[rt];
  if (sp && signals.species[sp])   score += 25 * signals.species[sp];

  return score;
}

function topSignalLabels(signals) {
  const all = [];
  Object.entries(signals.artists).forEach(([a,n]) => all.push({ label: a, weight: n*50, type:'artist' }));
  Object.entries(signals.sets).forEach(([s,n]) => all.push({ label: s, weight: n*30, type:'set' }));
  Object.entries(signals.types).forEach(([t,n]) => all.push({ label: t+' type', weight: n*20, type:'type' }));
  Object.entries(signals.species).forEach(([sp,n]) => all.push({ label: sp, weight: n*25, type:'species' }));
  return all.sort((a,b)=>b.weight-a.weight).slice(0,5);
}

// ─── CARD GRID HTML ──────────────────────────────────────────
function cardGrid(cards, opts) {
  if (!cards.length) return '<div class="empty-state"><i class="ti ti-cards"></i><p>No cards found</p></div>';
  opts = opts||{};
  let sorted = [...cards];
  if (opts.sortBy === 'name')   sorted.sort((a,b) => (a.name||'').localeCompare(b.name||''));
  if (opts.sortBy === 'number') sorted.sort((a,b) => parseInt(a.number||0)-parseInt(b.number||0));
  // default: keep API order (already -rarity)

  return '<div class="cards-grid">'
    + sorted.map(c => cardHTML(c, opts)).join('')
    + '</div>';
}

function cardHTML(c, opts) {
  opts = opts||{};
  const id = c.id, owned = S.collection[id], wanted = S.wanted[id];
  const img = cImg(c), rc = rarPip(cRar(c)), rs = rarShort(cRar(c));
  const vote = S.votes[id];
  let scorePip = '';
  if (opts.score != null && opts.score > 0) {
    const cls = opts.score >= 100 ? 'hi' : opts.score >= 40 ? 'hi' : 'mid';
    const lbl = opts.score >= 100 ? 'Saved' : opts.score >= 80 ? 'Great' : opts.score >= 40 ? 'Good' : 'Possible';
    scorePip = '<div class="score-pip '+cls+'"><i class="ti ti-sparkles" style="font-size:8px"></i>'+lbl+'</div>';
  }
  const cls = ['card-item', owned?'owned':'', (wanted&&!owned)?'wanted':'',
    vote==='yes'?'accepted':'', vote==='no'?'rejected':''].filter(Boolean).join(' ');
  let hbtns = '<div class="hover-btns">'
    +'<button class="hbtn" data-a="own" data-id="'+id+'"><i class="ti ti-check"></i>'+(owned?'Owned':'Own')+'</button>'
    +'<button class="hbtn" data-a="want" data-id="'+id+'"><i class="ti ti-star"></i>Want</button>';
  if (opts.binderId) hbtns += '<button class="hbtn" data-a="addslot" data-id="'+id+'" data-bid="'+opts.binderId+'"><i class="ti ti-folder-plus"></i>Add</button>';
  hbtns += '</div>';
  let curate = '';
  if (opts.curate && opts.binderId) {
    curate = '<div class="curate-actions">'
      +'<button class="cbtn y'+(vote==='yes'?' on':'')+'" data-a="vote-y" data-id="'+id+'" data-bid="'+opts.binderId+'"><i class="ti ti-thumb-up" style="font-size:10px"></i>Fits</button>'
      +'<button class="cbtn n'+(vote==='no'?' on':'')+'" data-a="vote-n" data-id="'+id+'" data-bid="'+opts.binderId+'"><i class="ti ti-thumb-down" style="font-size:10px"></i>Skip</button>'
      +'</div>';
  }
  return '<div>'
    +'<div class="'+cls+'" data-a="detail" data-id="'+id+'">'
    +(img ? '<img class="card-img" src="'+img+'" alt="'+c.name+'" loading="lazy">'
           : '<div class="card-no-img"><i class="ti ti-photo"></i></div>')
    +scorePip
    +(rc&&rs ? '<div class="rarity-pip '+rc+'">'+rs+'</div>' : '')
    +'<div class="card-label">'
    +'<div class="card-name">'+c.name+'</div>'
    +'<div class="card-num">'+cNum(c)+'</div>'
    +'<div class="card-set">'+cSet(c)+'</div>'
    +'<div class="card-badges">'
    +(owned?'<span class="badge badge-owned">Owned</span>':'')
    +(wanted&&!owned?'<span class="badge badge-wanted">Wanted</span>':'')
    +'</div></div>'
    +hbtns+'</div>'+curate+'</div>';
}

// ─── PAGINATION ──────────────────────────────────────────────
function paginationHTML(page, total, action) {
  if (total <= PS) return '';
  const tp = Math.ceil(total/PS);
  let pages = [];
  if (tp<=7) { for(let i=1;i<=tp;i++) pages.push(i); }
  else {
    pages=[1];
    if(page>3) pages.push('…');
    for(let i=Math.max(2,page-1);i<=Math.min(tp-1,page+1);i++) pages.push(i);
    if(page<tp-2) pages.push('…');
    pages.push(tp);
  }
  return '<div class="pagination">'
    +'<button class="pg-btn" data-a="'+action+'" data-p="'+(page-1)+'"'+(page===1?' disabled':'')+'>‹</button>'
    +pages.map(p => p==='…' ? '<span style="color:var(--soft)">…</span>'
      : '<button class="pg-btn'+(p===page?' cur':'')+'" data-a="'+action+'" data-p="'+p+'">'+p+'</button>').join('')
    +'<button class="pg-btn" data-a="'+action+'" data-p="'+(page+1)+'"'+(page===tp?' disabled':'')+'>›</button>'
    +'</div>';
}

  } catch(e) {
    return errorView('Could not load sets. Please check your connection.', 'discover');

    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">'

    +'<div class="page-title" style="margin-bottom:0">By Set</div>'
    +'</div>'
    +'<p class="page-sub">'+sets.length+' sets</p>';
  Object.entries(groups).forEach(([ser, items]) => {
    html += '<div class="sec-title">'+ser+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:8px">';

      +'<optgroup label="All Tag Ideas">'+PRESET_TAGS.map(t=>'<option value="TAG:'+t+'"'+(activeTagFilter==='TAG:'+t?' selected':'')+'>'+t+'</option>').join('')+'</optgroup>'
      +'</select>'
      +(activeTagFilter ? '<button class="btn" data-a="clear-tag-filter" style="padding:5px 10px;font-size:11px"><i class="ti ti-x"></i> Clear</button>' : '')
      +'</div>';

    let cards = [];
    let subNote = '';
    if (activeTagFilter && activeTagFilter.startsWith('TAG:')) {
      const tag = activeTagFilter.slice(4);
      const taggedIds = Object.entries(S.tags).filter(([,ts])=>ts.includes(tag)).map(([id])=>id);
      if (taggedIds.length) {
        cards = await fetchByIds(taggedIds);
        subNote = '<p style="font-size:12px;color:var(--soft);margin-bottom:10px">'+cards.length+' card'+(cards.length!==1?'s':'')+' tagged "'+tag+'". Click any to add to next open slot.</p>';
      } else {
        subNote = '<p style="font-size:12px;color:var(--rose600);margin-bottom:10px;background:var(--rose100);padding:8px 12px;border-radius:8px">No cards tagged "'+tag+'" yet. Tag cards from their detail panel.</p>';
      }
    } else {
      const allIds = [...new Set(b.pages.flat().filter(Boolean))];
      let extraQ = '';
      if (allIds.length) {
        const seeds = await fetchByIds(allIds);
        const allTypes = seeds.flatMap(c => cType(c));
        if (allTypes.length) {
          const topType = Object.entries(allTypes.reduce((m,t)=>{m[t]=(m[t]||0)+1;return m;},{}))
            .sort((a,b)=>b[1]-a[1])[0];
          if (topType) extraQ = 'types:'+topType[0];
        }
      }
      const d = await fetchFullArt(extraQ, 1, 40);
      cards = d.data || [];
      subNote = '<p style="font-size:12px;color:var(--soft);margin-bottom:10px">Full art cards. Click any to add to the next open slot.</p>';
    }

    return hdr+tabs+tagFilterHTML+subNote+cardGrid(cards, { sortBy, binderId });

  } else { // suggest
    const allIds = [...new Set(b.pages.flat().filter(Boolean))];
    if (!allIds.length) return hdr+tabs
      +'<div class="empty-state"><i class="ti ti-wand"></i><p>Add some cards to this binder first, then come back here for suggestions based on your taste.</p></div>';
    const seeds = await fetchByIds(allIds);
    const signals = buildSignals(seeds);
    const seedIdSet = new Set(allIds);
    // fetch candidates based on top signal
    const topArtist = Object.entries(signals.artists).sort((a,b)=>b[1]-a[1])[0];
    const topType   = Object.entries(signals.types).sort((a,b)=>b[1]-a[1])[0];
    const topSet    = Object.entries(signals.sets).sort((a,b)=>b[1]-a[1])[0];
    const queries = [];
    if (topArtist) queries.push('artist:"'+topArtist[0]+'"');
    if (topSet)    queries.push('set.id:'+topSet[0]);
    if (topType)   queries.push('types:'+topType[0]);
    // Fetch from multiple signals, dedupe
    const candidateMap = {};
    await Promise.all(queries.map(async q => {
      try {
        const d = await fetchFullArt(q, 1, 30);
        (d.data||[]).forEach(c => { if (!candidateMap[c.id]) candidateMap[c.id]=c; });
      } catch(e) {}
    }));
    const candidates = Object.values(candidateMap);
    const scored = candidates
      .map(c => ({ c, score: scoreCandidate(c, signals, seedIdSet) }))
      .filter(x => x.score >= 0)
      .sort((a,b) => b.score-a.score);
    const pending  = scored.filter(x => !S.votes[x.c.id]);
    const accepted = scored.filter(x => S.votes[x.c.id]==='yes');
    const rejected = scored.filter(x => S.votes[x.c.id]==='no');
    const sigLabels = topSignalLabels(signals);
    const banner = '<div class="suggest-banner">'
      +'<div style="font-size:13px;font-weight:700;margin-bottom:4px">Suggestions based on your binder</div>'
      +'<div style="font-size:12px;color:var(--soft);margin-bottom:8px">Matching by artist, set, type, rarity style, and Pokémon species. Fits adds to binder — Skip hides it.</div>'
      +'<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">'
      +'<span style="background:var(--green100);color:var(--green600);padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700">'+accepted.length+' saved</span>'
      +'<span style="background:var(--rose100);color:var(--rose600);padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700">'+rejected.length+' skipped</span>'
      +'<span style="background:var(--cream2);color:var(--soft);padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700">'+pending.length+' to review</span>'
      +'</div>'
      +'<div style="font-size:11px;color:var(--soft);margin-bottom:4px">Matching on:</div>'
      +'<div class="suggest-signals">'
      +sigLabels.map(s => '<span class="signal-chip on">'+s.label+'</span>').join('')
      +'</div>'
      +'</div>';
    const body = pending.length
      ? '<div class="cards-grid">'+pending.slice(0,24).map(x => cardHTML(x.c, { score: x.score, binderId, curate: true })).join('')+'</div>'
      : '<div class="empty-state" style="padding:24px"><i class="ti ti-check"></i><p>All caught up! Add more cards to the binder to get fresh suggestions.</p></div>';
    return hdr+tabs+banner+body;
  }
}

function binderHeader(id, b) {
  return '<div class="binder-hdr">'
    +'<div class="bdot" style="width:13px;height:13px;border-radius:50%;background:'+b.color+'"></div>'
    +'<div class="binder-title">'+b.name+'</div>'
    +'<div style="margin-left:auto;display:flex;gap:7px;flex-wrap:wrap">'
    +'<button class="btn danger" data-a="del-binder" data-id="'+id+'"><i class="ti ti-trash"></i></button>'
    +'</div></div>';
}
function binderTabs(id, active) {
  return '<div class="binder-tabs">'
    +[['layout','<i class="ti ti-book" style="font-size:12px"></i> Binder'],
      ['browse','<i class="ti ti-search" style="font-size:12px"></i> Browse'],
      ['suggest','<i class="ti ti-wand" style="font-size:12px"></i> Suggest']]
    .map(([t,lbl]) => '<div class="btab'+(active===t?' active':'')+'" data-a="binder-tab" data-id="'+id+'" data-tab="'+t+'">'+lbl+'</div>')
    .join('')
    +'</div>';

// ─── NAV ─────────────────────────────────────────────────────
function nav(v) {
  S.view = v; S.activeBinder = null;
  // reset discover detail when navigating to a discover section
  if (['discover','disc-set','disc-pokemon','disc-artist'].includes(v)) {
    S.discoverDetail = null;
    S.discover.page = 1;
  }
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-'+v);
  if (el) el.classList.add('active');
  // highlight parent discover if on sub-page
  if (['disc-set','disc-pokemon','disc-artist'].includes(v)) {
    const d = document.getElementById('nav-discover');
    if (d) d.classList.add('active');
  }
  document.querySelectorAll('.binder-li').forEach(el => el.classList.remove('active'));
  render();
}
function navBinder(id, tab) {
  S.view = 'binder'; S.activeBinder = id; S.binderTab = tab||'layout';
  if (tab !== 'browse') S.browseTagFilter = '';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.binder-li').forEach(el => el.classList.remove('active'));
  const bi = document.querySelector('.binder-li[data-id="'+id+'"]');
  if (bi) bi.classList.add('active');
  render();
}

// ─── RENDER ──────────────────────────────────────────────────
async function render() {
  const el = document.getElementById('main');
  if (!el) return;
  el.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading...</div>';
  try {
    let html = '';
    if      (S.view==='home')       html = viewDashboard();
    else if (S.view==='add')        html = viewAdd();
    else if (S.view==='discover')    html = viewDiscover();
    else if (S.view==='disc-set')    html = await viewDiscSet(S.discoverDetail);
    else if (S.view==='disc-pokemon')html = await viewDiscPokemon(S.discoverDetail);
    else if (S.view==='disc-artist') html = await viewDiscArtist(S.discoverDetail);
    else if (S.view==='collection') html = await viewCollection('collection');
    else if (S.view==='wanted')     html = await viewCollection('wanted');
    else if (S.view==='binder')     html = await viewBinder(S.activeBinder, S.binderTab);
    else if (S.view==='tags')       html = viewTags();
    else if (S.view==='tag-cards')  html = await viewTagCards(S.activeTag||'');
    else html = viewDashboard();
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty-state"><i class="ti ti-wifi-off"></i><p>Could not load. Check your connection.</p>'
      +'<button class="btn primary" style="margin-top:14px" data-a="retry"><i class="ti ti-refresh"></i> Retry</button></div>';
  }
  el.scrollTop = 0;
  attachListeners();
}

// ─── LISTENERS ───────────────────────────────────────────────
function attachListeners() {
  const el = document.getElementById('main');
  if (!el) return;
  el.addEventListener('click', onContentClick);

  // Pokémon search
  const pokemonQ = document.getElementById('pokemonQ');
  if (pokemonQ) {
    pokemonQ.focus();
    let pt;
    pokemonQ.addEventListener('input', () => {
      clearTimeout(pt);
      const v = pokemonQ.value.trim();
      const res = document.getElementById('pokemonResults');
      if (!v) { if(res) res.innerHTML=''; return; }
      if (res) res.innerHTML = '<div style="color:var(--soft);font-size:12px;padding:6px 0">Searching...</div>';
      pt = setTimeout(async () => {
        try {
          // get distinct Pokémon names matching query
          const d = await api('/cards', { q: 'name:"'+v+'*"', pageSize: 20, orderBy: 'name' });
          const cards = d.data || [];
          const res2 = document.getElementById('pokemonResults');
          if (!res2) return;
          if (!cards.length) { res2.innerHTML = '<div style="font-size:12px;color:var(--soft);padding:8px 10px;background:var(--cream2);border-radius:8px">No Pokémon found</div>'; return; }
          // dedupe by base name
          const seen = new Set();
          const names = [];
          cards.forEach(c => {
            const base = (c.name||'').replace(/\s+(V|VMAX|VSTAR|GX|EX|ex|BREAK|Radiant|Shining|Prism Star)$/i,'').trim();
            if (!seen.has(base)) { seen.add(base); names.push({ base, full: c.name }); }
          });
          res2.innerHTML = '<div style="display:flex;flex-direction:column;gap:5px">'
            + names.map(n =>
                '<div class="sri" data-a="disc-pokemon-detail" data-name="'+n.base+'" style="cursor:pointer">'
                +'<i class="ti ti-cards" style="font-size:18px;color:var(--lav300);flex-shrink:0"></i>'
                +'<div style="flex:1"><div style="font-size:13px;font-weight:700">'+n.base+'</div></div>'
                +'<i class="ti ti-chevron-right" style="color:var(--soft)"></i>'
                +'</div>'
              ).join('')
            +'</div>';
        } catch(e2) {
          const r2 = document.getElementById('pokemonResults');
          if (r2) r2.innerHTML = '<div style="font-size:12px;color:var(--rose600);padding:8px 10px;background:var(--rose100);border-radius:8px">Search failed</div>';
        }
      }, 400);
    });
  }

  // Artist search
  const artistQ = document.getElementById('artistQ');
  if (artistQ) {
    artistQ.focus();
    let at;
    artistQ.addEventListener('input', () => {
      clearTimeout(at);
      const v = artistQ.value.trim();
      const res = document.getElementById('artistResults');
      if (!v) { if(res) res.innerHTML=''; return; }
      if (res) res.innerHTML = '<div style="color:var(--soft);font-size:12px;padding:6px 0">Searching...</div>';
      at = setTimeout(async () => {
        try {
          const d = await api('/cards', { q: 'artist:"'+v+'*"', pageSize: 20, orderBy: 'name' });
          const cards = d.data || [];
          const res2 = document.getElementById('artistResults');
          if (!res2) return;
          if (!cards.length) { res2.innerHTML = '<div style="font-size:12px;color:var(--soft);padding:8px 10px;background:var(--cream2);border-radius:8px">No artists found</div>'; return; }
          // dedupe artist names
          const seen = new Set();
          const artists = [];
          cards.forEach(c => { const a = cArt(c); if (a && !seen.has(a)) { seen.add(a); artists.push(a); } });
          res2.innerHTML = '<div style="display:flex;flex-direction:column;gap:5px">'
            + artists.map(a =>
                '<div class="sri" data-a="disc-artist-detail" data-name="'+a+'" style="cursor:pointer">'
                +'<i class="ti ti-brush" style="font-size:18px;color:var(--gold300);flex-shrink:0"></i>'
                +'<div style="flex:1"><div style="font-size:13px;font-weight:700">'+a+'</div></div>'
                +'<i class="ti ti-chevron-right" style="color:var(--soft)"></i>'
                +'</div>'
              ).join('')
            +'</div>';
        } catch(e2) {
          const r2 = document.getElementById('artistResults');
          if (r2) r2.innerHTML = '<div style="font-size:12px;color:var(--rose600);padding:8px 10px;background:var(--rose100);border-radius:8px">Search failed</div>';
        }
      }, 400);
    });
  }

  // binder browse tag filter
  const browseTagSel = document.getElementById('browseTagSel');
  if (browseTagSel) {
    browseTagSel.addEventListener('change', () => {
      S.browseTagFilter = browseTagSel.value;
      render();
    });
  }

  // add search
  const addQ = document.getElementById('addQ');
  if (addQ) {
    addQ.focus();
    let t;
    addQ.addEventListener('input', () => {
      clearTimeout(t);
      const v = addQ.value.trim();
      const res = document.getElementById('addResults');
      if (res) res.innerHTML = v ? '<div style="color:var(--soft);font-size:12px;padding:6px 0">Searching...</div>' : '';
      if (!v) return;
      t = setTimeout(async () => {
        try {
          const cards = await searchFullArt(v);
          const res2 = document.getElementById('addResults');
          if (!res2) return;
          if (!cards.length) {
            res2.innerHTML = '<div style="font-size:12px;color:var(--soft);padding:8px 10px;background:var(--cream2);border-radius:8px;margin-top:8px">No full art cards found for that search.</div>';
            return;
          }
          res2.innerHTML = '<div style="font-size:11px;color:var(--soft);margin:8px 0 6px">'+cards.length+' result'+(cards.length!==1?'s':'')+' for "'+v+'"</div>'
            +'<div style="display:flex;flex-direction:column;gap:8px;max-height:480px;overflow-y:auto" id="addCardList">'
            +cards.map(c => {
              const owned = S.collection[c.id];
              const img = cImg(c);
              const cardTags = S.tags[c.id] || [];
              const tagHTML = '<div class="inline-tags" data-card-id="'+c.id+'" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;align-items:center">'
                + cardTags.map(t => '<span style="background:var(--lav100);border:1px solid var(--lav300);color:var(--lav500);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:3px">'
                    +t+'<button class="inline-tag-rm" data-card-id="'+c.id+'" data-tag="'+t+'" style="background:none;border:none;color:var(--lav500);cursor:pointer;font-size:10px;padding:0;line-height:1;margin-left:1px">×</button></span>').join('')
                + (cardTags.length < 5
                    ? '<input class="inline-tag-input" data-card-id="'+c.id+'" type="text" placeholder="+ tag" list="inlineTagList" style="border:1px dashed var(--borderl);border-radius:20px;padding:2px 8px;font-size:10px;font-family:var(--font);outline:none;background:none;color:var(--soft);width:70px;cursor:pointer" class="itag-inp-focus">'
                    : '')
                + '</div>';
              return '<div class="sri" style="flex-direction:column;align-items:flex-start;gap:6px">'
                +'<div style="display:flex;align-items:center;gap:9px;width:100%">'
                +(img ? '<img class="sri-img" src="'+img+'" alt="'+c.name+'" loading="lazy">'
                      : '<div class="sri-img" style="display:flex;align-items:center;justify-content:center"><i class="ti ti-photo" style="color:var(--soft)"></i></div>')
                +'<div class="sri-info">'
                +'<div style="font-size:13px;font-weight:700">'+c.name+'</div>'
                +'<div style="font-size:11px;color:var(--rose500);font-weight:700;margin-top:1px">'+cNum(c)+' · '+cSet(c)+'</div>'
                +'<div style="font-size:10px;color:var(--soft);margin-top:1px">'+cRar(c)+'</div>'
                +'</div>'
                +'<div style="flex-shrink:0;margin-left:auto">'
                +(owned
                  ? '<button class="btn owned-btn add-toggle" data-id="'+c.id+'" style="padding:5px 10px;font-size:11px">✓ Owned</button>'
                  : '<button class="btn primary add-toggle" data-id="'+c.id+'" style="padding:5px 10px;font-size:11px">+ Add</button>')
                +'</div></div>'
                + tagHTML
                +'</div>';
            }).join('')+'</div>'
            +'<datalist id="inlineTagList">'+[...new Set([...S.allTags,...PRESET_TAGS])].sort().map(t=>'<option value="'+t+'">').join('')+'</datalist>';
          // attach inline tag inputs
          res2.querySelectorAll('.inline-tag-input').forEach(input => {
            input.addEventListener('keydown', e => {
              if (e.key === 'Enter') {
                e.preventDefault();
                const cardId = input.dataset.cardId;
                const val = input.value.trim();
                if (val && addTagToCard(cardId, val)) {
                  input.value = '';
                  refreshInlineTags(cardId, res2);
                } else if ((S.tags[cardId]||[]).length >= 5) {
                  alert('Maximum 5 tags per card.');
                }
              }
            });
            // also add on blur if value present
            input.addEventListener('blur', () => {
              const cardId = input.dataset.cardId;
              const val = input.value.trim();
              if (val && addTagToCard(cardId, val)) {
                input.value = '';
                refreshInlineTags(cardId, res2);
              }
            });
          });
          res2.querySelectorAll('.inline-tag-rm').forEach(btn => {
            btn.addEventListener('click', e => {
              e.stopPropagation();
              removeTagFromCard(btn.dataset.cardId, btn.dataset.tag);
              refreshInlineTags(btn.dataset.cardId, res2);
            });
          });

          // attach add toggles
          res2.querySelectorAll('.add-toggle').forEach(btn => {
            btn.addEventListener('click', e => {
              e.stopPropagation();
              const id = btn.dataset.id;
              if (S.collection[id]) {
                delete S.collection[id]; save(); renderBinderNav();
                btn.className='btn primary add-toggle'; btn.style.cssText='padding:5px 10px;font-size:11px'; btn.textContent='+ Add';
              } else {
                S.collection[id]=true; delete S.wanted[id]; save(); renderBinderNav();
                btn.className='btn owned-btn add-toggle'; btn.style.cssText='padding:5px 10px;font-size:11px'; btn.textContent='✓ Owned';
              }
            });
          });
        } catch(e2) {
          const r2 = document.getElementById('addResults');
          if (r2) r2.innerHTML='<div style="font-size:12px;color:var(--rose600);padding:8px 10px;background:var(--rose100);border-radius:8px;margin-top:8px"><i class="ti ti-alert-circle"></i> Search failed. Check your connection.</div>';
        }
      }, 450);
    });
  }
}

function onContentClick(e) {
  const el = e.target.closest('[data-a]');
  if (!el) return;
  const a = el.dataset.a;
  if (a==='detail')     { e.stopPropagation(); openDetail(el.dataset.id); }
  else if (a==='own')   { e.stopPropagation(); toggleOwned(el.dataset.id); }
  else if (a==='want')  { e.stopPropagation(); toggleWanted(el.dataset.id); }
  else if (a==='addslot')  { e.stopPropagation(); addToSlot(el.dataset.bid, el.dataset.id); }
  else if (a==='vote-y')   { e.stopPropagation(); vote(el.dataset.id, el.dataset.bid, 'yes'); }
  else if (a==='vote-n')   { e.stopPropagation(); vote(el.dataset.id, el.dataset.bid, 'no'); }
  else if (a==='binder-tab')   { navBinder(el.dataset.id, el.dataset.tab); }
  else if (a==='open-picker')  { e.stopPropagation(); openPicker(el.dataset.bid, +el.dataset.pi, +el.dataset.si); }
  else if (a==='rm-slot')      { e.stopPropagation(); rmSlot(el.dataset.bid, +el.dataset.pi, +el.dataset.si); }
  else if (a==='add-page')     { addPage(el.dataset.id); }
  else if (a==='del-binder')   { delBinder(el.dataset.id); }
  else if (a==='nav')          { nav(el.dataset.v); }
  else if (a==='tag-binder')  { createBinderFromTag(el.dataset.tag); }
  else if (a==='tag-view')    { S.view='tag-cards'; S.activeTag=el.dataset.tag; render(); }
  else if (a==='clear-tag-filter')    { S.browseTagFilter=''; render(); }
  else if (a==='disc-set-detail')     { S.view='disc-set'; S.discoverDetail=el.dataset.setid; S.discover.page=1; render(); }
  else if (a==='disc-pokemon-detail') { S.view='disc-pokemon'; S.discoverDetail=el.dataset.name; S.discover.page=1; render(); }
  else if (a==='disc-artist-detail')  { S.view='disc-artist'; S.discoverDetail=el.dataset.name; S.discover.page=1; render(); }
  else if (a==='disc-set-page')       { const p=+el.dataset.p; if(p>=1){S.discover.page=p;render();} }
  else if (a==='disc-pokemon-page')   { const p=+el.dataset.p; if(p>=1){S.discover.page=p;render();} }
  else if (a==='disc-artist-page')    { const p=+el.dataset.p; if(p>=1){S.discover.page=p;render();} }
  else if (a==='retry')       { render(); }
}

// ─── COLLECTION ACTIONS ──────────────────────────────────────
function toggleOwned(id) {
  if (S.collection[id]) delete S.collection[id];
  else { S.collection[id]=true; delete S.wanted[id]; }
  save(); renderBinderNav(); render();
}
function toggleWanted(id) {
  if (S.wanted[id]) delete S.wanted[id];
  else if (!S.collection[id]) S.wanted[id]=true;
  save(); render();
}
function vote(cardId, binderId, v) {
  S.votes[cardId]=v; save();
  if (v==='yes' && binderId) addToSlot(binderId, cardId);
  else render();
}

// ─── BINDER ACTIONS ──────────────────────────────────────────
function binderCount(b) { return b.pages ? b.pages.reduce((t,p)=>t+p.filter(Boolean).length,0) : 0; }
function makeSlots(lid) { const l=LAYOUTS.find(x=>x.id===lid)||LAYOUTS[1]; return Array(l.cols*l.rows).fill(null); }

function addToSlot(binderId, cardId) {
  const b=S.binders[binderId]; if(!b) return;
  const l=LAYOUTS.find(x=>x.id===(b.layout||'3x3'))||LAYOUTS[1];
  const spp=l.cols*l.rows;
  for (let pi=0;pi<b.pages.length;pi++) {
    for (let si=0;si<spp;si++) {
      if (!b.pages[pi][si]) { b.pages[pi][si]=cardId; save(); renderBinderNav(); render(); return; }
    }
  }
  b.pages.push(makeSlots(b.layout||'3x3')); b.pages[b.pages.length-1][0]=cardId;
  save(); renderBinderNav(); navBinder(binderId,'layout');
}
function rmSlot(binderId, pi, si) { const b=S.binders[binderId]; if(!b)return; b.pages[pi][si]=null; save(); renderBinderNav(); render(); }
function addPage(binderId) { const b=S.binders[binderId]; if(!b)return; b.pages.push(makeSlots(b.layout||'3x3')); save(); render(); }
function delBinder(binderId) { if(!confirm('Delete this binder?'))return; delete S.binders[binderId]; save(); renderBinderNav(); nav('home'); }

// ─── BINDER NAV ──────────────────────────────────────────────
function renderBinderNav() {
  const nav = document.getElementById('binder-nav');
  if (!nav) return;
  nav.innerHTML = Object.entries(S.binders).map(([id,b]) =>
    '<div class="binder-li'+(S.activeBinder===id?' active':'')+'" data-id="'+id+'">'
    +'<div class="bdot" style="background:'+(b.color||'#888')+'"></div>'
    +'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)">'+b.name+'</span>'
    +'<span style="font-size:10px;color:var(--soft)">'+binderCount(b)+'</span>'
    +'</div>'
  ).join('');
  nav.querySelectorAll('.binder-li').forEach(el => {
    el.addEventListener('click', () => navBinder(el.dataset.id));
  });
}

// ─── DETAIL ──────────────────────────────────────────────────
async function openDetail(cardId) {
  document.getElementById('detailOv').classList.add('open');
  // look in cache first
  let card = null;
  for (const k in _cache) {
    const d=_cache[k]; if(!d) continue;
    if(d.data && Array.isArray(d.data)) { card=d.data.find(c=>c.id===cardId); if(card) break; }
    if(d.id===cardId) { card=d; break; }
  }
  if (!card) { try { const d=await api('/cards/'+cardId); card=d.data||d; } catch(e){} }
  if (!card) { document.getElementById('detailOv').classList.remove('open'); return; }
  S.detailCard = card;
  document.getElementById('dImg').src = cImgL(card);
  document.getElementById('dName').textContent = card.name;
  document.getElementById('dNum').textContent = cNum(card)+(cRar(card)?' · '+cRar(card):'');
  document.getElementById('dSet').textContent = cSet(card)+(cSer(card)?' · '+cSer(card):'');
  document.getElementById('dEbay').href = ebayUrl(card);
  document.getElementById('dBulba').href = bulbaUrl(card);
  document.getElementById('btnOwned').className = 'status-btn'+(S.collection[cardId]?' on-owned':'');
  document.getElementById('btnWanted').className= 'status-btn'+(S.wanted[cardId]?' on-wanted':'');
  document.getElementById('dRows').innerHTML = [
    ['Type',(cType(card)||[]).join(', ')||'—'],
    ['HP',card.hp||'—'],['Artist',cArt(card)||'—'],
    ['Set',cSet(card)||'—'],['Rarity',cRar(card)||'—'],
  ].map(([l,v])=>'<div class="drow"><span class="dl">'+l+'</span><span class="dv">'+v+'</span></div>').join('');
  renderDetailChips(cardId);
  renderDetailTags(cardId);
}
// ─── MY TAGS VIEW ────────────────────────────────────────────
function viewTags() {
  rebuildAllTags();
  const allTags = S.allTags;
  if (!allTags.length) {
    return '<div class="page-title">My Tags</div>'
      +'<div class="empty-state"><i class="ti ti-tags"></i>'
      +'<p>No tags yet.<br>Open any card and add a tag to get started.<br>You can use our suggestions or create your own.</p></div>';
  }
  let html = '<div class="page-title">My Tags</div>'
    +'<p class="page-sub">Tap any tag to create a binder from those cards</p>';

  allTags.forEach(tag => {
    const cardIds = Object.entries(S.tags).filter(([,ts]) => ts.includes(tag)).map(([id]) => id);
    if (!cardIds.length) return;
    html += '<div class="sec-title">'+tag+' <span style="font-weight:400;color:var(--soft)">'+cardIds.length+' card'+(cardIds.length!==1?'s':'')+'</span></div>'
      +'<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">'
      +'<button class="btn primary" data-a="tag-binder" data-tag="'+tag+'"><i class="ti ti-book"></i> Create Binder</button>'
      +'<button class="btn" data-a="tag-view" data-tag="'+tag+'"><i class="ti ti-cards"></i> View Cards</button>'
      +'</div>';
  });
  return html;
}

async function viewTagCards(tag) {
  const cardIds = Object.entries(S.tags).filter(([,ts]) => ts.includes(tag)).map(([id]) => id);
  if (!cardIds.length) return '<div class="page-title">'+tag+'</div><div class="empty-state"><i class="ti ti-cards"></i><p>No cards tagged yet</p></div>';
  const cards = await fetchByIds(cardIds);
  return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">'
    +'<div class="page-title" style="margin-bottom:0">'+tag+'</div>'
    +'<button class="btn primary" data-a="tag-binder" data-tag="'+tag+'"><i class="ti ti-book"></i> Create Binder</button>'
    +'<button class="btn" data-a="nav" data-v="tags"><i class="ti ti-arrow-left"></i> All Tags</button>'
    +'</div>'
    +'<p class="page-sub">'+cards.length+' card'+(cards.length!==1?'s':'')+' tagged</p>'
    +cardGrid(cards, { sortBy: S.sortBy||'name' });
}

function createBinderFromTag(tag) {
  const cardIds = Object.entries(S.tags).filter(([,ts]) => ts.includes(tag)).map(([id]) => id);
  if (!cardIds.length) { alert('No cards tagged with "'+tag+'" yet.'); return; }
  const id = 'b_'+Date.now();
  const layout = '3x3';
  const pages = [];
  const l = LAYOUTS.find(x=>x.id===layout)||LAYOUTS[1];
  const spp = l.cols*l.rows;
  for (let i=0; i<cardIds.length; i+=spp) {
    const page = cardIds.slice(i, i+spp);
    while (page.length < spp) page.push(null);
    pages.push(page);
  }
  // pick a color based on tag name hash
  const colorIdx = tag.split('').reduce((acc,ch)=>acc+ch.charCodeAt(0),0) % COLORS.length;
  S.binders[id] = { name: tag, color: COLORS[colorIdx], layout, pages, created: Date.now(), tag };
  save(); renderBinderNav(); navBinder(id, 'layout');
}

function renderDetailChips(cardId) {
  const w = document.getElementById('dChips');
  w.innerHTML = Object.entries(S.binders).map(([id,b])=>{
    const inB = b.pages && b.pages.some(p=>p.includes(cardId));
    return '<div class="chip'+(inB?' in':'')+'" data-chip="'+id+'">'
      +'<div class="bdot" style="background:'+b.color+'"></div>'+b.name+(inB?' <i class="ti ti-check" style="font-size:10px"></i>':'')
      +'</div>';
  }).join('') || '<span style="font-size:12px;color:var(--soft)">No binders yet</span>';
  w.querySelectorAll('[data-chip]').forEach(ch => {
    ch.addEventListener('click', () => {
      const bid=ch.dataset.chip, b=S.binders[bid]; if(!b||!S.detailCard) return;
      const inB=b.pages&&b.pages.some(p=>p.includes(S.detailCard.id));
      if(inB) { b.pages.forEach((p,pi)=>p.forEach((s,si)=>{if(s===S.detailCard.id)b.pages[pi][si]=null;})); save(); renderBinderNav(); renderDetailChips(S.detailCard.id); }
      else addToSlot(bid, S.detailCard.id);
    });
  });
}
function renderDetailTags(cardId) {
  const current = S.tags[cardId] || [];
  const countEl = document.getElementById('dTagCount');
  if (countEl) countEl.textContent = current.length ? '('+current.length+'/3)' : '';
  const wrap = document.getElementById('dTags');
  if (!wrap) return;
  wrap.innerHTML = current.map(t =>
    '<span style="display:inline-flex;align-items:center;gap:4px;background:var(--lav100);border:1px solid var(--lav300);color:var(--lav500);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;margin:2px">'
    +t+'<button style="background:none;border:none;color:var(--lav500);cursor:pointer;font-size:11px;line-height:1;padding:0 0 0 2px" data-rm-tag="'+t+'">×</button></span>'
  ).join('') || '<span style="font-size:12px;color:var(--soft)">No tags yet</span>';
  // remove tag buttons
  wrap.querySelectorAll('[data-rm-tag]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      removeTagFromCard(cardId, btn.dataset.rmTag);
      renderDetailTags(cardId);
    });
  });
  // tag input
  const input = document.getElementById('dTagQ');
  const datalist = document.getElementById('dTagSuggestions');
  const addBtn = document.getElementById('dTagAdd');
  if (!input || !addBtn) return;
  // hide input if at limit
  const inputWrap = document.getElementById('dTagInput');
  if (inputWrap) inputWrap.style.display = current.length >= 5 ? 'none' : 'flex';
  // populate datalist suggestions
  if (datalist) {
    datalist.innerHTML = getTagSuggestions(cardId).map(t => '<option value="'+t+'">').join('');
  }
  // wire add button (remove old listeners by cloning)
  const newBtn = addBtn.cloneNode(true);
  addBtn.parentNode.replaceChild(newBtn, addBtn);
  const newInput = input.cloneNode(true);
  input.parentNode.replaceChild(newInput, input);
  newBtn.addEventListener('click', () => {
    const val = document.getElementById('dTagQ').value.trim();
    if (!val) return;
    if (addTagToCard(cardId, val)) {
      document.getElementById('dTagQ').value = '';
      renderDetailTags(cardId);
    } else if ((S.tags[cardId]||[]).length >= 5) {
      alert('Maximum 5 tags per card.');
    }
  });
  document.getElementById('dTagQ').addEventListener('keydown', e => {
    if (e.key==='Enter') { newBtn.click(); }
  });
}

function closeDetail() { document.getElementById('detailOv').classList.remove('open'); S.detailCard=null; }

// ─── PICKER ──────────────────────────────────────────────────
async function openPicker(binderId, pi, si) {
  S.picker={binderId,pi,si,cards:[]};
  document.getElementById('pickerOv').classList.add('open');
  document.getElementById('pickerQ').value='';
  const grid=document.getElementById('pickerGrid');
  grid.innerHTML='<div style="padding:16px;color:var(--soft);font-size:13px;text-align:center">Loading...</div>';
  const ids=Object.keys(S.collection);
  if(!ids.length){grid.innerHTML='<div style="padding:16px;color:var(--soft);font-size:13px;text-align:center">Add cards to your collection first.</div>';return;}
  S.picker.cards=await fetchByIds(ids);
  renderPickerGrid(S.picker.cards);
}
function renderPickerGrid(cards) {
  const g=document.getElementById('pickerGrid');
  if(!cards.length){g.innerHTML='<div style="padding:16px;color:var(--soft);font-size:13px;text-align:center">No cards found</div>';return;}
  g.innerHTML=cards.map(c=>{
    const img=cImg(c);
    return '<div class="pcard" data-pid="'+c.id+'">'
      +(img?'<img src="'+img+'" alt="'+c.name+'">'
           :'<div style="aspect-ratio:2.5/3.5;background:var(--cream2);display:flex;align-items:center;justify-content:center"><i class="ti ti-photo" style="color:var(--soft)"></i></div>')
      +'<div class="pcard-name">'+c.name+'</div><div class="pcard-num">'+cNum(c)+'</div></div>';
  }).join('');
  g.querySelectorAll('.pcard').forEach(el=>el.addEventListener('click',()=>placeCard(el.dataset.pid)));
}
function placeCard(cardId) {
  const b=S.binders[S.picker.binderId]; if(!b) return;
  b.pages[S.picker.pi][S.picker.si]=cardId; save(); renderBinderNav(); closePicker(); render();
}
function closePicker() { document.getElementById('pickerOv').classList.remove('open'); }

// ─── NEW BINDER ──────────────────────────────────────────────
function openNewBinder() {
  S.nb={color:COLORS[0],layout:'3x3'};
  document.getElementById('bName').value='';
  const sw=document.getElementById('bSwatches');
  sw.innerHTML=COLORS.map((c,i)=>'<div class="swatch'+(i===0?' on':'')+'" data-c="'+c+'" style="background:'+c+'"></div>').join('');
  sw.querySelectorAll('.swatch').forEach(el=>el.addEventListener('click',()=>{
    S.nb.color=el.dataset.c; sw.querySelectorAll('.swatch').forEach(s=>s.classList.remove('on')); el.classList.add('on');
  }));
  const lp=document.getElementById('bLayouts');
  lp.innerHTML=LAYOUTS.map(l=>'<div class="lopt'+(l.id==='3x3'?' on':'')+'" data-lid="'+l.id+'">'
    +'<div class="lgrid" style="grid-template-columns:repeat('+l.cols+',1fr);grid-template-rows:repeat('+l.rows+',1fr)">'+Array(l.cols*l.rows).fill('<div class="lcell"></div>').join('')+'</div>'
    +'<div class="llabel">'+l.label+'</div></div>').join('');
  lp.querySelectorAll('.lopt').forEach(el=>el.addEventListener('click',()=>{
    S.nb.layout=el.dataset.lid; lp.querySelectorAll('.lopt').forEach(o=>o.classList.remove('on')); el.classList.add('on');
  }));
  // populate tag select — show user's tags first (with counts), then all presets
  const tagSel = document.getElementById('bTag');
  const userTagSet = new Set(S.allTags);
  const allTagOptions = [...new Set([...S.allTags, ...PRESET_TAGS])].sort();
  tagSel.innerHTML = '<option value="">No tag — start empty</option>';
  // group: user tags with cards first
  if (S.allTags.length) {
    const og1 = document.createElement('optgroup'); og1.label = 'My Tags';
    S.allTags.forEach(t => {
      const count = Object.values(S.tags).filter(ts => ts.includes(t)).length;
      const o = document.createElement('option'); o.value=t;
      o.textContent = t + ' (' + count + ' card' + (count!==1?'s':'') + ')';
      og1.appendChild(o);
    });
    tagSel.appendChild(og1);
  }
  // all preset tags (excluding ones already shown above)
  const og2 = document.createElement('optgroup'); og2.label = 'All Tag Ideas';
  PRESET_TAGS.forEach(t => {
    const o = document.createElement('option'); o.value=t; o.textContent=t;
    og2.appendChild(o);
  });
  tagSel.appendChild(og2);
  tagSel.value = '';
  document.getElementById('bTagPreview').style.display = 'none';
  tagSel.onchange = () => {
    const tag = tagSel.value;
    const preview = document.getElementById('bTagPreview');
    if (!tag) { preview.style.display='none'; return; }
    // auto-set binder name to tag name if name is empty
    const nameEl = document.getElementById('bName');
    if (!nameEl.value.trim()) nameEl.value = tag;
    // pick color based on tag
    const colorIdx = tag.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % COLORS.length;
    const sw = document.getElementById('bSwatches');
    sw.querySelectorAll('.swatch').forEach(s => s.classList.remove('on'));
    const match = [...sw.querySelectorAll('.swatch')].find(s => s.dataset.c === COLORS[colorIdx]);
    if (match) { match.classList.add('on'); S.nb.color = COLORS[colorIdx]; }
    // show preview
    const count = Object.values(S.tags).filter(ts => ts.includes(tag)).length;
    preview.style.display = 'block';
    preview.innerHTML = '<i class="ti ti-wand" style="font-size:12px"></i> Will auto-fill '
      + count + ' card' + (count!==1?'s':'') + ' from your "'+tag+'" tag';
  };
  document.getElementById('binderOv').classList.add('open');
}
function createBinder() {
  const name = document.getElementById('bName').value.trim(); if (!name) return;
  const tag  = document.getElementById('bTag').value;
  const id   = 'b_'+Date.now();
  const layout = S.nb.layout;
  const l    = LAYOUTS.find(x=>x.id===layout)||LAYOUTS[1];
  const spp  = l.cols*l.rows;

  if (tag) {
    // fill from tag
    const cardIds = Object.entries(S.tags).filter(([,ts])=>ts.includes(tag)).map(([id])=>id);
    const pages = [];
    for (let i=0; i<Math.max(cardIds.length,1); i+=spp) {
      const page = cardIds.slice(i, i+spp);
      while (page.length < spp) page.push(null);
      pages.push(page);
    }
    S.binders[id] = { name, color:S.nb.color, layout, pages, created:Date.now(), tag };
  } else {
    S.binders[id] = { name, color:S.nb.color, layout, pages:[makeSlots(layout)], created:Date.now() };
  }

  save();
  document.getElementById('binderOv').classList.remove('open');
  renderBinderNav();
  navBinder(id, 'layout');
}
